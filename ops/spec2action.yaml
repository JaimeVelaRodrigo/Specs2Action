meta:
  name: "Spec2Action"
  version: "1.0.0-draft"
  status: "draft"
  last_updated: "2026-04-23"
  owner: "Jaime Vela Rodrigo"
  role: "operating_system"
  description: >
    Translates identity and foresight into decision-making, execution
    frameworks and interaction with real-world constraints.

current_priority:
  focus: "Stabilize financial position and activate ALFA through ONEDGE"

  context:
    description: >
      The current situation requires generating sustainable income while
      repositioning capabilities in energy, infrastructure and digital platforms.

    constraints:
      - financial pressure
      - limited time horizon for income generation
      - need to validate market relevance

  strategic_assets:
    alfa:
      description: >
        Vehicle for structuring, advising and developing opportunities in
        infrastructure, energy and technology.

    onedge:
      description: >
        Digital platform focused on energy flexibility, with potential to
        connect technological capability with real market needs.

  success_definition:
    - generate first revenue linked to ALFA / ONEDGE
    - validate at least one real market use case
    - establish positioning in energy flexibility / infrastructure

operating_modes:
  - name: "Discernment"
    description: >
      Understanding the structure of a situation before acting.
      Avoid premature decisions.

  - name: "Decision"
    description: >
      Choosing a direction under uncertainty using value, constraints
      and long-term coherence.

  - name: "Execution"
    description: >
      Moving from decision to action with discipline and focus.

  - name: "Reflection"
    description: >
      Evaluating outcomes and integrating learning.

decision_framework:
  core_filter:
    questions:
      - "Does this create sustained value?"
      - "Is this aligned with my core values?"
      - "Is this economically viable?"
      - "Does this increase or reduce coherence?"
      - "Am I acting from clarity or reaction?"

opportunity_evaluation:
  dimensions:
    - value_creation
    - financial_viability
    - alignment_with_identity
    - long_term_potential
    - complexity_level

execution_loop:
  structure:
    - understand the situation
    - define decision
    - identify next 3 actions
    - execute within ≤7 days
    - review outcome

ai_usage:
  role: >
    AI is used as a thinking partner to expand perception, structure
    reasoning and explore scenarios, not as a replacement for judgment.

  rules:
    - do not outsource final decisions
    - use AI to clarify, not to simplify prematurely
    - integrate multiple perspectives
    - always translate output into action

constraints_handling:
  description: >
    Work is performed under financial, temporal and structural constraints.
    Constraints are not avoided but used to refine decisions and focus action.

value_tracking:
  metrics:
    - cash_flow
    - decision_quality
    - coherence
    - progress toward long-term positioning

action_pipeline:
  objective: >
    Generate initial revenue and validate ONEDGE as a platform
    for energy flexibility in real market conditions.

  horizon: "next 30 days"

  tracks:

    - name: "Direct Revenue Activation"
      goal: >
        Secure at least one paid advisory engagement linked to
        energy, infrastructure or flexibility.

      actions:
        - identify 10 high-probability contacts (past network, energy, infrastructure)
        - send tailored outreach message with clear value proposition
        - propose 90-minute paid session (Executive Foresight Session)
        - close at least 1 paid engagement

    - name: "ONEDGE Validation"
      goal: >
        Test ONEDGE with at least one real use case or potential client.

      actions:
        - define 1 concrete use case (e.g. flexibility, demand response, optimization)
        - identify 3 potential users or partners
        - run exploratory conversations
        - validate problem-solution fit

    - name: "Positioning"
      goal: >
        Establish visible positioning in energy flexibility and infrastructure.

      actions:
        - write 1 LinkedIn post articulating your perspective on energy flexibility
        - share insight connecting infrastructure, AGI and energy systems
        - reach out to 5 relevant professionals for conversation

  weekly_execution_rule:
    description: >
      Every week must produce visible movement:
      - at least 5 outreach actions
      - at least 2 real conversations
      - at least 1 concrete opportunity

  success_metrics:
    - number_of_conversations
    - number_of_opportunities
    - revenue_generated
    - ONEDGE validation signals
